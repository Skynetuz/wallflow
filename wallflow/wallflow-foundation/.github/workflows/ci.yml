name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  lint-and-test-linux:
    name: Linux – fmt, check, clippy, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check workspace
        run: cargo check --workspace

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --workspace

  check-windows:
    name: Windows – check & test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check workspace
        run: cargo check --workspace

      - name: Run tests
        run: cargo test --workspace

      # NOTE: Desktop attach smoke tests are NOT run in CI because the
      # Windows runner does not have an interactive Explorer desktop session.
      # Those tests require REQUIRES_REAL_WINDOWS_VALIDATION.

  headless-smoke:
    name: Headless supervisor smoke
    runs-on: ubuntu-latest
    needs: lint-and-test-linux
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build renderer
        run: cargo build -p wallflow-renderer

      - name: Build CLI
        run: cargo build -p wallflow-cli

      - name: Run headless heartbeat renderer
        run: |
          timeout 15 ./target/debug/wallflow-renderer --headless-heartbeat --heartbeat-interval-ms 500 --timeout-secs 5 || true
          echo "Headless heartbeat test completed"

      - name: Run supervisor smoke
        run: |
          timeout 30 cargo run -p wallflow-cli -- supervisor-smoke --timeout-secs 5 --heartbeat-interval-ms 500 || true
          echo "Supervisor smoke test completed"
